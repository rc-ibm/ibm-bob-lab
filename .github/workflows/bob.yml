# This workflow creates a description of changes when a PR is created
name: Summarise pull request changes
permissions:
  pull-requests: write
on:
  pull_request:
    types: [opened, synchronize]
jobs:
  pr-analysis:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
    - run: curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --pm npm
    - run: export PATH="/root/.bob/bin:${PATH}" && bob --version
    - name: Generate PR description
      env:
        BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
      run: echo "BOB_OUTPUT=$(export BOBSHELL_API_KEY=$BOBSHELL_API_KEY && bob -p 'Generate a detail PR description for @$GITHUB_REF')" >> "$GITHUB_ENV"
    - name: Create PR comment
      id: description
      uses: peter-evans/create-or-update-comment@v5
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body: |
          Bob-generated output:
          $BOB_OUTPUT
